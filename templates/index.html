{% extends "base.html" %}

{% block content %}
<div class="header">
    <h1>🏡 Property Scoring Dashboard</h1>
</div>

{% include "_shared_filters.html" %}

<div class="control-group">
    <div class="add-property-container" style="flex-direction: row; gap: 15px; flex-wrap: wrap;">
        <button type="button" onclick="showAddPropertyModal()" class="add-property-btn" id="addPropertyButton" {% if not password_correct %}disabled title="Login required to add properties"{% endif %}>
            ➕ Add New Property
        </button>
    </div>
    <div style="text-align: center; margin-top: 5px;">
        <span class="add-property-hint">Submit a Zillow URL for review</span>
    </div>
</div>

<div id="propertyResults">
    {% include "_table_results.html" %}
</div>

<!-- Add Property Modal -->
<div id="addPropertyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ Add New Property</h3>
            <span class="close" onclick="closeAddPropertyModal()">&times;</span>
        </div>
        <div class="modal-body">
            <label for="zillowUrl">Paste Zillow URL:</label>
            <input type="url" id="zillowUrl" placeholder="https://www.zillow.com/homedetails/..." />
            <div id="urlStatus" style="margin-top: 8px; font-size: 12px; min-height: 16px;"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="modal-btn modal-btn-secondary"
                onclick="closeAddPropertyModal()">Cancel</button>
            <button type="button" class="modal-btn modal-btn-primary" onclick="submitProperty()" id="submitBtn">Add
                Property</button>
        </div>
    </div>
</div>

<style>
    .add-property-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .add-property-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: linear-gradient(135deg, var(--success) 0%, #20c997 100%);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
    }

    .add-property-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .add-property-btn:disabled {
        background: var(--border-focus);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .add-property-hint {
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
    }

    /* Modal styles */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
    }

    .modal-content {
        background-color: var(--surface-solid);
        margin: 10% auto;
        padding: 24px;
        border: none;
        border-radius: var(--radius-lg);
        width: 90%;
        max-width: 500px;
        box-shadow: var(--shadow-lg);
        transform: translateY(0);
        animation: modalSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes modalSlideIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
        margin: 0;
        color: var(--text-main);
        font-size: 20px;
        font-weight: 700;
    }

    .close {
        color: var(--text-muted);
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        line-height: 1;
        transition: color 0.2s;
    }

    .close:hover { color: var(--danger); }

    .modal-body { margin-bottom: 24px; }
    .modal-body label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-main);
    }

    .modal-body input[type="url"] {
        width: 100%;
        padding: 12px;
        border: 2px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 15px;
        box-sizing: border-box;
        transition: var(--transition);
    }

    .modal-body input[type="url"]:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    .modal-btn {
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    .modal-btn-primary { background: var(--primary); color: white; }
    .modal-btn-primary:hover { background: var(--primary-hover); }
    .modal-btn-secondary { background: #e2e8f0; color: var(--text-main); }
    .modal-btn-secondary:hover { background: #cbd5e0; }

    @media (max-width: 768px) {
        .add-property-btn { width: 100%; justify-content: center; }
        .modal-content { margin: 5% auto; width: 95%; }
    }
</style>

<script>
    window.propertyViewMode = 'table';
    window.renderPropertyView = function () {};

    // AI Recommendations state management
    let aiRankingEnabled = false; // Default to OFF
    const THRESHOLD_STORAGE_KEYS = {
        score: 'scoreThresholdSelection',
        ai: 'aiRankThresholdSelection'
    };
    const thresholdConfig = {
        score: {
            min: {{ score_min|round(1) }},
            max: {{ score_max|round(1) }},
            step: 0.1,
            fallback: {{ min_score_threshold }}
        },
        ai: {
            min: {{ ai_rank_min }},
            max: {{ ai_rank_max }},
            step: 1,
            fallback: {{ ai_rank_threshold }}
        }
    };

    function getRankingModeInput() {
        return document.getElementById('ranking_mode');
    }

    function getCurrentThresholdMode() {
        const modeInput = getRankingModeInput();
        return modeInput && modeInput.value === 'ai' ? 'ai' : 'score';
    }

    function formatThresholdValue(value, mode) {
        const numericValue = parseFloat(value);
        if (Number.isNaN(numericValue)) {
            return mode === 'ai' ? '0' : '0.0';
        }
        return mode === 'ai' ? String(Math.round(numericValue)) : numericValue.toFixed(1);
    }

    function saveThresholdPreference() {
        const mode = getCurrentThresholdMode();
        const slider = document.getElementById('min_score_threshold');
        if (!slider) return;

        localStorage.setItem(THRESHOLD_STORAGE_KEYS[mode], slider.value);
        if (mode === 'score') {
            slider.value = parseFloat(slider.value).toFixed(1);
        } else {
            slider.value = String(Math.round(parseFloat(slider.value)));
        }

        const aiThresholdInput = document.getElementById('ai_rank_threshold');
        if (aiThresholdInput && mode === 'ai') {
            aiThresholdInput.value = slider.value;
        }
    }

    function setThresholdSliderMode(mode) {
        const slider = document.getElementById('min_score_threshold');
        const minLabel = document.getElementById('scoreThresholdMin');
        const maxLabel = document.getElementById('scoreThresholdMax');
        const valueLabel = document.getElementById('scoreThresholdValue');
        const thresholdLabel = document.getElementById('thresholdLabel');
        const aiThresholdInput = document.getElementById('ai_rank_threshold');
        const modeInput = getRankingModeInput();
        if (!slider || !modeInput) return;

        const selectedMode = mode === 'ai' ? 'ai' : 'score';
        const config = thresholdConfig[selectedMode];
        const savedValue = localStorage.getItem(THRESHOLD_STORAGE_KEYS[selectedMode]);

        modeInput.value = selectedMode;
        slider.min = String(config.min);
        slider.max = String(config.max);
        slider.step = String(config.step);

        let selectedValue = savedValue !== null ? parseFloat(savedValue) : parseFloat(config.fallback);
        if (Number.isNaN(selectedValue)) {
            selectedValue = parseFloat(config.fallback);
        }
        selectedValue = Math.max(config.min, Math.min(config.max, selectedValue));
        if (selectedMode === 'ai') {
            selectedValue = Math.round(selectedValue);
            if (aiThresholdInput) {
                aiThresholdInput.value = String(selectedValue);
            }
        }

        slider.value = selectedMode === 'ai' ? String(selectedValue) : selectedValue.toFixed(1);
        if (minLabel) minLabel.textContent = formatThresholdValue(config.min, selectedMode);
        if (maxLabel) maxLabel.textContent = formatThresholdValue(config.max, selectedMode);
        if (valueLabel) valueLabel.textContent = formatThresholdValue(slider.value, selectedMode);
        if (thresholdLabel) {
            thresholdLabel.textContent = selectedMode === 'ai'
                ? '🎯 Maximum AI Rank (show top AI-ranked properties):'
                : '🎯 Minimum Score Threshold (filters blank ratings only):';
        }
    }

    function toggleAIRanking() {
        const toggle = document.getElementById('aiRankingToggle');
        const description = document.getElementById('toggleDescription');
        const status = document.getElementById('aiRankingStatus');

        // Don't change anything if disabled (non-authenticated users)
        if (toggle.disabled) {
            return;
        }

        // Preserve current mode threshold before switching modes.
        saveThresholdPreference();
        aiRankingEnabled = toggle.checked;
        const mode = aiRankingEnabled ? 'ai' : 'score';
        setThresholdSliderMode(mode);

        // Sort the table
        sortTableByCurrentMode();

        // Update UI
        if (aiRankingEnabled) {
            description.textContent = 'Sorted by Gemini AI recommendations';

            // Check if any AI ranks exist
            const rows = document.querySelectorAll('table tbody tr[data-ai-rank]');
            const hasRanks = Array.from(rows).some(r => parseInt(r.dataset.aiRank) < 99999);
            if (!hasRanks) {
                status.textContent = '⚠️ No AI rankings available yet — run ai_ranker.py first';
                status.style.color = '#ff8c00';
            } else {
                status.textContent = '✅ Sorted by AI recommendations';
                status.style.color = '#28a745';
                setTimeout(() => { status.textContent = ''; }, 3000);
            }
        } else {
            description.textContent = 'Sort by Gemini AI recommendations';
            status.textContent = '';
        }

        // Save preference
        localStorage.setItem('aiRankingEnabled', aiRankingEnabled.toString());
        updateFilters();
    }

    function sortTableByCurrentMode() {
        const tableBody = document.querySelector('table tbody');
        if (!tableBody) return;

        // Collect all row pairs (data row + details row)
        const rowPairs = [];
        const allRows = Array.from(tableBody.children);
        for (let i = 0; i < allRows.length; i++) {
            const row = allRows[i];
            if (row.dataset.aiRank !== undefined) {
                // This is a data row — the next row is its details row
                const detailsRow = allRows[i + 1];
                rowPairs.push({ dataRow: row, detailsRow: detailsRow });
                i++; // Skip details row
            }
        }

        // Sort by the appropriate attribute
        if (aiRankingEnabled) {
            rowPairs.sort((a, b) => {
                const rankA = parseInt(a.dataRow.dataset.aiRank);
                const rankB = parseInt(b.dataRow.dataset.aiRank);
                return rankA - rankB;
            });
        } else {
            rowPairs.sort((a, b) => {
                const scoreA = parseFloat(a.dataRow.dataset.totalScore);
                const scoreB = parseFloat(b.dataRow.dataset.totalScore);
                return scoreB - scoreA; // Higher score first
            });
        }

        // Re-append in sorted order (moves DOM nodes)
        const fragment = document.createDocumentFragment();
        rowPairs.forEach(pair => {
            fragment.appendChild(pair.dataRow);
            if (pair.detailsRow) {
                fragment.appendChild(pair.detailsRow);
            }
        });
        tableBody.appendChild(fragment);
    }

    function initializeAIRanking() {
        const toggle = document.getElementById('aiRankingToggle');
        if (!toggle) return;

        // For non-authenticated users, keep toggle disabled and unchecked (default OFF)
        if (toggle.disabled) {
            aiRankingEnabled = false;
            toggle.checked = false;
            setThresholdSliderMode('score');
            return;
        }

        // Load saved preference for authenticated users (default to OFF if no preference)
        const saved = localStorage.getItem('aiRankingEnabled');
        if (saved !== null) {
            aiRankingEnabled = saved === 'true';
        } else {
            aiRankingEnabled = false;
        }

        toggle.checked = aiRankingEnabled;
        const desiredMode = aiRankingEnabled ? 'ai' : 'score';
        const modeInput = getRankingModeInput();
        const needsModeSync = modeInput && modeInput.value !== desiredMode;
        setThresholdSliderMode(desiredMode);
        if (needsModeSync) {
            updateFilters();
            return;
        }

        // Update UI based on current state
        const description = document.getElementById('toggleDescription');
        if (aiRankingEnabled) {
            description.textContent = 'Sorted by Gemini AI recommendations';
            // Sort by AI rank on page load if enabled
            sortTableByCurrentMode();
        } else {
            description.textContent = 'Sort by Gemini AI recommendations';
        }
    }

    function goToMap() {
        // Build URL with current parameters
        const currentParams = new URLSearchParams(window.location.search);
        const params = new URLSearchParams();

        // Add all current parameters (excluding weight parameters since map doesn't use scoring)
        for (const [key, value] of currentParams.entries()) {
            if (!key.startsWith('weight_') && key !== 'optimizer_aggressiveness') {
                params.append(key, value);
            }
        }

        // Navigate to map page with parameters
        window.location.href = '/map?' + params.toString();
    }

    function goToSettings() {
        // Build URL with current parameters (weights, filters, password)
        const currentParams = new URLSearchParams(window.location.search);
        const settingsParams = new URLSearchParams();

        // Transfer password if it exists
        const passwordValue = document.getElementById('password').value;
        if (passwordValue) {
            settingsParams.append('password', passwordValue);
        }

        // Transfer ALL current parameters to settings URL (not just weights)
        for (const [key, value] of currentParams.entries()) {
            settingsParams.append(key, value);
        }

        // Navigate to settings
        const url = '/settings' + (settingsParams.toString() ? '?' + settingsParams.toString() : '');
        window.location.href = url;
    }

    // triggerAutoOptimization and performOptimization removed —
    // AI Recommendations now uses pre-computed rankings from ai_ranker.py


    function updateScoreThresholdLabel(value) {
        const valueElement = document.getElementById('scoreThresholdValue');
        if (!valueElement) return;

        valueElement.textContent = formatThresholdValue(value, getCurrentThresholdMode());
    }

    function updateSliderRange(scoreMin, scoreMax) {
        if (getCurrentThresholdMode() === 'ai') {
            return;
        }

        const slider = document.getElementById('min_score_threshold');
        const minLabel = document.getElementById('scoreThresholdMin');
        const maxLabel = document.getElementById('scoreThresholdMax');

        if (slider) {
            // Update slider attributes but preserve current value
            const currentValue = parseFloat(slider.value);
            slider.min = scoreMin.toFixed(1);
            slider.max = scoreMax.toFixed(1);

            // Only update the value if it's outside the new range
            if (currentValue < scoreMin) {
                slider.value = scoreMin.toFixed(1);
                updateScoreThresholdLabel(slider.value);
            } else if (currentValue > scoreMax) {
                slider.value = scoreMax.toFixed(1);
                updateScoreThresholdLabel(slider.value);
            }
        }

        if (minLabel) {
            minLabel.textContent = scoreMin.toFixed(1);
        }

        if (maxLabel) {
            maxLabel.textContent = scoreMax.toFixed(1);
        }
    }

    function updatePropertiesTable(properties) {
        // Find the table body
        const tableBody = document.querySelector('table tbody');
        if (!tableBody) {
            console.error('Could not find table body');
            return;
        }

        // Add subtle fade effect during update
        const tableContainer = document.querySelector('.table-container');
        if (tableContainer) {
            tableContainer.style.opacity = '0.7';
            tableContainer.style.transition = 'opacity 0.3s ease';
        }

        // Clear current content
        tableBody.innerHTML = '';

        // Rebuild table rows with new data - matching exact template structure
        properties.forEach((property, index) => {
            // Create main property row
            const row = document.createElement('tr');
            row.dataset.aiRank = property.ai_rank != null ? property.ai_rank : 99999;
            row.dataset.totalScore = property.total_score || 0;

            row.innerHTML = `
            <td class="rating-column">
                <select class="rating-select" 
                        onchange="updateRating(${property.zpid}, this.value, document.getElementById('password').value)">
                    <option value="" ${property.rating === '' ? 'selected' : ''}>-</option>
                    <option value="yes" ${property.rating === 'yes' ? 'selected' : ''}>✅</option>
                    <option value="maybe" ${property.rating === 'maybe' ? 'selected' : ''}>🤔</option>
                    <option value="no" ${property.rating === 'no' ? 'selected' : ''}>❌</option>
                </select>
            </td>
            <td class="info-column" style="text-align: center;">
                <span class="info-icon" onclick="showDetails(${property.zpid})" 
                      style="cursor: pointer; font-size: 16px; color: #667eea;" 
                      title="Click for property details">
                    ℹ️
                </span>
            </td>
            <td class="location-cell">
                <a href="${property.source_url || '#'}" target="_blank" class="listing-link">
                    ${property.city_state || 'View Listing'}
                </a>
            </td>
            <td class="price">$${property.price ? property.price.toLocaleString() : 'N/A'}</td>
            <td style="text-align: center;" title="School rating (1-10 scale)">
                ${property.avg_school_rating ?
                    `<span style="color: ${property.school_rating_color || '#999'}; font-weight: bold;">${Math.round(property.avg_school_rating * 10) / 10}</span>` :
                    '<span style="color: #999999;">-</span>'}
            </td>
            <td style="text-align: center; font-size: 18px;" title="Crime level: ${property.crime_emoji || '❓'}">
                ${property.crime_emoji || '❓'}
            </td>
            <td style="text-align: center;" title="Drive time to grocery store in minutes">
                ${property.drive_time ?
                    `<span style="color: ${property.drive_time_color || '#999'}; font-weight: bold;">${property.drive_time}min</span>` :
                    '<span style="color: #DC143C; font-size: 16px;">🚫</span>'}
            </td>
            <td class="hide-very-small">${property.beds || '-'}</td>
            <td class="hide-very-small">${property.baths || '-'}</td>
            <td class="hide-mobile">${property.home_size_sqft ? property.home_size_sqft.toLocaleString() : '-'}</td>
            <td class="hide-mobile">${property.lot_size_acres ? Math.round(property.lot_size_acres * 10) / 10 : '-'}</td>
            <td class="hide-mobile-kitchen">${property.kitchen_quality || '-'}</td>
            <td class="hide-mobile">${property.bathroom_quality || '-'}</td>
            <td class="hide-mobile">${property.general_interior_quality || '-'}</td>
            <td class="hide-mobile">${property.privacy_level || '-'}</td>
        `;

            tableBody.appendChild(row);

            // Create details row (initially hidden) - matching template structure
            const detailsRow = document.createElement('tr');
            detailsRow.id = `details-${property.zpid}`;
            detailsRow.style.display = 'none';
                const mainRow = document.querySelector(`select[onchange*="${zpid}"]`)?.closest('tr');
                if(mainRow) mainRow.classList.remove('active-details');

            detailsRow.innerHTML = `
            <td colspan="15">
                <div style="background: #f8f9fa; padding: 15px; border-radius: 6px; margin: 5px 0;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 15px;">
                        <div>
                            <h4 style="margin: 0 0 8px 0; color: #667eea;">✨ Positive Features</h4>
                            <p style="margin: 0; font-size: 14px;">${property.positive_features_list || 'No special features noted'}</p>
                        </div>
                        ${property.negative_features_list ? `
                        <div>
                            <h4 style="margin: 0 0 8px 0; color: #667eea;">⚠️ Negative Features</h4>
                            <p style="margin: 0; font-size: 14px;">${property.negative_features_list}</p>
                        </div>
                        ` : ''}
                        <div>
                            <h4 style="margin: 0 0 8px 0; color: #667eea;">🛒 Grocery Store</h4>
                            <p style="margin: 0; font-size: 14px;">
                                ${property.grocery_name ?
                    `${property.grocery_name} - ${property.drive_time || '?'} min drive` +
                    (property.grocery_rating ? `<br><small>(${property.grocery_rating}★ rating${property.grocery_ratings_count ? ` from ${property.grocery_ratings_count} reviews` : ''})</small>` : '')
                    : '<span style="color: #DC143C;">🚫 No grocery information available</span>'}
                            </p>
                        </div>
                        <div>
                            <h4 style="margin: 0 0 8px 0; color: #667eea;">📍 Full Address</h4>
                            <p style="margin: 0; font-size: 14px;">${property.full_address || 'Address not available'}</p>
                        </div>
                    </div>
                    <div style="margin-top: 10px; text-align: right;">
                        <button onclick="showDetails(${property.zpid})" 
                                style="background: #667eea; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">
                            Close
                        </button>
                    </div>
                </div>
            </td>
        `;

            tableBody.appendChild(detailsRow);
        });

        // Restore opacity after update
        setTimeout(() => {
            if (tableContainer) {
                tableContainer.style.opacity = '1';
            }
        }, 100);

        console.log(`Updated table with ${properties.length} properties`);
    }

    // Check if we just returned from settings and show notification
    function checkForSettingsReturn() {
        const urlParams = new URLSearchParams(window.location.search);
        const hasWeightParams = Array.from(urlParams.keys()).some(key => key.startsWith('weight_'));

        if (hasWeightParams) {
            const statusDiv = document.getElementById('aiRankingStatus');
            if (statusDiv) {
                statusDiv.textContent = '⚙️ Custom weights applied';
                statusDiv.style.color = '#ff8c00';
                setTimeout(() => { statusDiv.textContent = ''; }, 5000);
            }
        }
    }

    // Add Property Modal Functions
    function showAddPropertyModal() {
        const modal = document.getElementById('addPropertyModal');
        const urlInput = document.getElementById('zillowUrl');
        const statusDiv = document.getElementById('urlStatus');
        const submitBtn = document.getElementById('submitBtn');

        // Reset modal state
        urlInput.value = '';
        statusDiv.textContent = '';
        statusDiv.style.color = '';

        // Reset submit button to default state
        submitBtn.textContent = 'Add Property';
        submitBtn.disabled = false;
        submitBtn.onclick = function () { submitProperty(); };

        // Show modal
        modal.style.display = 'block';

        // Focus on input
        setTimeout(() => urlInput.focus(), 100);
    }

    function closeAddPropertyModal() {
        const modal = document.getElementById('addPropertyModal');
        modal.style.display = 'none';
    }

    function extractZpidFromUrl(url) {
        // Extract ZPID from Zillow URL
        // Example: https://www.zillow.com/homedetails/23131-N-Poe-Valley-Rd-Klamath-Falls-OR-97603/75163204_zpid/?utm_campaign=androidappmessage&utm_medium=referral&utm_source=txtshare
        const zpidMatch = url.match(/\/(\d+)_zpid/);
        return zpidMatch ? zpidMatch[1] : null;
    }

    function submitProperty() {
        const urlInput = document.getElementById('zillowUrl');
        const statusDiv = document.getElementById('urlStatus');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');

        const url = urlInput.value.trim();
        const password = passwordInput.value;

        // Validate URL
        if (!url) {
            statusDiv.textContent = '❌ Please enter a Zillow URL';
            statusDiv.style.color = '#dc3545';
            return;
        }

        // Check if it's a Zillow URL
        if (!url.includes('zillow.com')) {
            statusDiv.textContent = '❌ Please enter a valid Zillow URL';
            statusDiv.style.color = '#dc3545';
            return;
        }

        // Extract ZPID
        const zpid = extractZpidFromUrl(url);
        if (!zpid) {
            statusDiv.textContent = '❌ Could not extract property ID from URL';
            statusDiv.style.color = '#dc3545';
            return;
        }

        // Show loading state
        statusDiv.textContent = '🔄 Processing...';
        statusDiv.style.color = '#667eea';
        submitBtn.disabled = true;

        // Submit to server
        const formData = new FormData();
        formData.append('zillow_url', url);
        formData.append('zpid', zpid);
        formData.append('password', password);

        fetch('/add_property', {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                submitBtn.disabled = false;

                if (data.success) {
                    statusDiv.textContent = data.message;
                    statusDiv.style.color = '#28a745';

                    // Check if this is a "property already exists" message
                    if (data.message.includes('Property already exists')) {
                        // Replace modal content with property details and rating dropdown
                        const modal = document.getElementById('addPropertyModal');
                        const modalContent = modal.querySelector('.modal-content');

                        modalContent.innerHTML = `
                    <div class="modal-header">
                        <h3>🏠 Property Already Exists</h3>
                        <span class="close" onclick="closeAddPropertyModal()">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div style="margin-bottom: 15px; padding: 15px; background: #f8f9fa; border-radius: 6px;">
                            <p style="margin: 0; font-size: 14px; color: #666;">
                                ${data.message}
                            </p>
                        </div>

                        <div style="margin-bottom: 20px;">
                            <label for="property-rating-${data.zpid}" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Your Current Rating:</label>
                            <select id="property-rating-${data.zpid}" style="width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 4px; font-size: 14px;">
                                <option value="" ${data.current_rating === '' ? 'selected' : ''}>-</option>
                                <option value="yes" ${data.current_rating === 'yes' ? 'selected' : ''}>✅ Yes</option>
                                <option value="maybe" ${data.current_rating === 'maybe' ? 'selected' : ''}>🤔 Maybe</option>
                                <option value="no" ${data.current_rating === 'no' ? 'selected' : ''}>❌ No</option>
                            </select>
                        </div>

                        <div style="background: #e8f4fd; padding: 10px; border-radius: 4px; border-left: 3px solid #667eea; margin-bottom: 15px;">
                            <p style="margin: 0; font-size: 13px; color: #4a5568;">
                                <strong>💡 Tip:</strong> Update your rating above or click "Keep Current" to maintain your existing rating.
                            </p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="modal-btn modal-btn-secondary" onclick="closeAddPropertyModal()">Cancel</button>
                        <button type="button" class="modal-btn modal-btn-primary" onclick="updatePropertyRating(${data.zpid})" id="updateRatingBtn">Update Rating</button>
                        <button type="button" class="modal-btn" onclick="closeAddPropertyModal()" style="background: #28a745; color: white;">Keep Current</button>
                    </div>
                `;

                        // Add event listener for rating changes
                        const ratingSelect = document.getElementById(`property-rating-${data.zpid}`);
                        if (ratingSelect) {
                            ratingSelect.addEventListener('change', function () {
                                const updateBtn = document.getElementById('updateRatingBtn');
                                if (updateBtn) {
                                    updateBtn.style.display = this.value !== data.current_rating ? 'inline-block' : 'none';
                                }
                            });
                        }

                        // Initially hide update button if rating hasn't changed
                        const updateBtn = document.getElementById('updateRatingBtn');
                        if (updateBtn) {
                            updateBtn.style.display = 'none';
                        }

                    } else {
                        // For "added for review" messages, close after delay
                        setTimeout(() => {
                            closeAddPropertyModal();
                        }, 2000);
                    }
                } else {
                    statusDiv.textContent = data.message || '❌ Error adding property';
                    statusDiv.style.color = '#dc3545';
                }
            })
            .catch(error => {
                console.error('Error adding property:', error);
                submitBtn.disabled = false;
                statusDiv.textContent = '❌ Network error. Please try again.';
                statusDiv.style.color = '#dc3545';
            });
    }

    // Update property rating from the property exists modal
    function updatePropertyRating(zpid) {
        const password = document.getElementById('password').value;
        if (!password) {
            alert('Password required to update ratings');
            return;
        }

        const ratingSelect = document.getElementById(`property-rating-${zpid}`);
        if (!ratingSelect) {
            alert('Rating selector not found');
            return;
        }

        const newRating = ratingSelect.value;

        // Show loading state
        const updateBtn = document.getElementById('updateRatingBtn');
        if (updateBtn) {
            updateBtn.disabled = true;
            updateBtn.textContent = 'Updating...';
        }

        const formData = new FormData();
        formData.append('zpid', zpid);
        formData.append('rating', newRating);
        formData.append('password', password);

        fetch('/update_rating', {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (updateBtn) {
                    updateBtn.disabled = false;
                    updateBtn.textContent = 'Update Rating';
                }

                if (data.success) {
                    // Close modal after successful update
                    closeAddPropertyModal();

                    // Show success message briefly
                    const statusDiv = document.getElementById('urlStatus');
                    if (statusDiv) {
                        statusDiv.textContent = '✅ Rating updated successfully!';
                        statusDiv.style.color = '#28a745';
                        setTimeout(() => {
                            statusDiv.textContent = '';
                        }, 2000);
                    }

                    // Reload the page to reflect the updated rating
                    setTimeout(() => {
                        location.reload();
                    }, 500);
                } else {
                    alert('Error updating rating: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error updating rating:', error);
                if (updateBtn) {
                    updateBtn.disabled = false;
                    updateBtn.textContent = 'Update Rating';
                }
                alert('Error updating rating');
            });
    }

    // Close modal when clicking outside
    window.onclick = function (event) {
        const modal = document.getElementById('addPropertyModal');
        if (event.target === modal) {
            closeAddPropertyModal();
        }
    }

    // Initialize AI ranking toggle on page load
    document.addEventListener('DOMContentLoaded', function () {
        initializeAIRanking();
        checkForSettingsReturn();
    });
</script>

{% endblock %}
